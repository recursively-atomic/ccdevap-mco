<!DOCTYPE html>
<html lang="en">
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="author" content="Mikhael Darryl Y. Ac-ac">
    <meta charset="UTF-8">

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/js/bootstrap.bundle.min.js"
            integrity="sha384-MrcW6ZMFYlzcLA8Nl+NtUVF0sA7MsXsP1UyJoMp4YLEuNSfAP+JcXn/tWtIaxVXM" crossorigin="anonymous"
            defer></script>
    <script src="https://cdn.jsdelivr.net/npm/jquery@4.0.0/dist/jquery.min.js"
            integrity="sha256-OaVG6prZf4v69dPg6PhVattBXkcOWQB62pdZ3ORyrao=" crossorigin="anonymous" defer></script>
    <script src="/scripts/admin/admin-dashboard.js" defer></script>
    
    <link rel="stylesheet" href="/styles/override.css">
    <link rel="stylesheet" href="/styles/additional.css">

    <link rel="shortcut icon" href="/media/company-logo.png" type="image/x-icon">
    <title> Cebu Atlantic </title>
</head>
<body class=" bg-dark" style="background-image: url('https://picsum.photos/200/300/?blur=2'); background-size: cover; background-repeat: no-repeat; background-position: center center;">

    <div class="container">
        <div class="row justify-content-center">
            <div class="col-12 col-md-6 col-lg-4">
                <div class="card shadow-sm rounded-3 p-4 mt-5 mb-5">
                    <img class="d-inline-block align-items-center mb-2" width="40px" src="/media/company-logo.png">
                    <h2 class="text-center mb-4"> Login </h2>
                    <form id="admin-login-form" method="POST" action="/api/admin/login">
                        <div class="mb-3">
                            <label for="emailAddress" class="form-label"> Email Address </label>
                            <input type="email" class="form-control" id="emailAddress" name="emailAddress" 
                            placeholder="Enter your email" required>
                        </div>

                        <div class="mb-3">
                            <label for="password" class="form-label"> Password </label>
                            <input type="password" class="form-control" id="password" name="password" 
                            placeholder="Enter your password" required>
                        </div>

                        <button type="submit" class="btn btn-secondary w-100"> Login </button>
                        <div class="mt-3 text-center">
                            <a href="/views/register.html" class="text-decoration-none"> No account? Sign up </a>
                    </form>
                </div>
            </div>
        </div>

    </div>
</body>
</html>
